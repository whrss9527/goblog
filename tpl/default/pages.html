{{define "content"}}
<div class="container">
    <div class="content-wrap">
        <div class="content">
            <header class="article-header">
                <h1 class="article-title"><a href="">{{.page.Title}}</a></h1>

            </header>

            <article class="article-content">
                <div id="page-viewer">
                    <textarea id="append-test" style="display:none;">{{.page.Content}}</textarea>
                </div>

            </article>
            <script src="https://giscus.app/client.js"
                    data-repo="whrss9527/blog-comments"
                    data-repo-id="R_kgDOI5Sj3w"
                    data-category-id="DIC_kwDOI5Sj384CT-Us"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="top"
                    data-theme="preferred_color_scheme"
                    data-lang="zh-CN"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>

    </div>
</div>
<script type="text/javascript">

    window.onload = function () {
        let pageViewer = editormd.markdownToHTML("page-viewer", {
            htmlDecode: "style,script,iframe",  // you can filter tags decode
            emoji: true,
            taskList: true,
            tex: true,  // 默认不解析
            flowChart: true,  // 默认不解析
            sequenceDiagram: true,  // 默认不解析
        });
    }
</script>
{{end}}
